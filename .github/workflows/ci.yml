name: XRisk Engine CI

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    defaults:
      run:
        working-directory: xrisk-engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: xrisk-engine/package-lock.json

      - name: Install
        run: npm install

      - name: Run Core Tests
        run: npm run test:core

      - name: Run Security Regression Tests
        run: npm run test:security
